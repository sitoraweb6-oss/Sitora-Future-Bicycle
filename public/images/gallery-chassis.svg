<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#coolGrad)"/>
  
  <!-- Grid Matrix -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="250" x2="800" y2="250" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="350" x2="800" y2="350" />
    <line x1="0" y1="400" x2="800" y2="400" />
    
    <line x1="100" y1="0" x2="100" y2="450" />
    <line x1="200" y1="0" x2="200" y2="450" />
    <line x1="300" y1="0" x2="300" y2="450" />
    <line x1="400" y1="0" x2="400" y2="450" />
    <line x1="500" y1="0" x2="500" y2="450" />
    <line x1="600" y1="0" x2="600" y2="450" />
    <line x1="700" y1="0" x2="700" y2="450" />
  </g>

  <!-- Radial Glow Behind Hub -->
  <circle cx="400" cy="225" r="250" fill="url(#ringGlow)" />

  <!-- Chassis Vector Line Drawing -->
  <g stroke="#60a5fa" stroke-opacity="0.6" stroke-width="2" fill="none">
    <!-- Hubless circular wheels reference -->
    <circle cx="220" cy="270" r="110" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="10 5" />
    <circle cx="220" cy="270" r="100" stroke="#60a5fa" stroke-width="3" />
    <circle cx="580" cy="270" r="110" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="10 5" />
    <circle cx="580" cy="270" r="100" stroke="#60a5fa" stroke-width="3" />

    <!-- Connecting Frame geometry -->
    <path d="M 220 270 L 350 270 L 460 160 L 580 270 M 350 270 L 400 130 L 510 130 H 550 M 400 130 L 460 160" stroke="#ffffff" stroke-opacity="0.75" stroke-width="4.5" stroke-linejoin="round" />
    <path d="M 220 270 L 400 130" stroke="#22d3ee" stroke-opacity="0.8" stroke-width="2" />
  </g>

  <!-- High-tech blueprint elements / markers -->
  <g fill="#22d3ee" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">
    <circle cx="460" cy="160" r="4" fill="#fb923c" />
    <line x1="460" y1="160" x2="520" y2="100" stroke="#fb923c" stroke-width="1.5" />
    <text x="530" y="96" fill="#fb923c" font-weight="bold">TORSION CENTER / MONOCOQUE JOINT</text>
    <text x="530" y="112" fill="#ffffff" fill-opacity="0.6" font-size="8">RATING: 2,200 NM LOAD MAX</text>

    <!-- Specs table in top right corner -->
    <rect x="520" y="20" width="260" height="60" fill="#020612" fill-opacity="0.85" rx="6" stroke="#ffffff" stroke-opacity="0.1" />
    <text x="535" y="38" font-size="8" fill="#ffffff" fill-opacity="0.4">CHASSIS SERIE ENGINE</text>
    <text x="535" y="52" font-size="11" fill="#ffffff" font-weight="bold">FTR IM8 CARBON CORE</text>
    <text x="535" y="66" font-size="9" fill="#22d3ee">LAYER: 45° STRATA DENSITY</text>

    <!-- Coordinates watermark -->
    <text x="30" y="420" font-size="8" fill="#ffffff" fill-opacity="0.3">MODEL: CHASSIS-CORE-v9.2 // [LAT. 59.3293, LON. 18.0686]</text>
  </g>
</svg>
