<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="100%" height="100%">
  <defs>
    <linearGradient id="avatarGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
  </defs>

  <!-- Circular background frame with stylish gradient -->
  <circle cx="75" cy="75" r="70" fill="url(#avatarGrad2)" />
  
  <!-- Outer thin technical rings -->
  <circle cx="75" cy="75" r="64" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-dasharray="4 4" stroke-width="1" />
  <circle cx="75" cy="75" r="58" fill="none" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.5" />

  <!-- Modern, sleek typography initials -->
  <text 
    x="75" 
    y="86" 
    fill="#ffffff" 
    font-family="'Space Grotesk', 'Inter', sans-serif" 
    font-size="34" 
    font-weight="bold" 
    text-anchor="middle" 
    letter-spacing="1.5"
    style="text-shadow: 0 4px 12px rgba(0,0,0,0.35);"
  >ER</text>
  
  <!-- Subtle futuristic micro-line design on the edge -->
  <line x1="45" y1="110" x2="105" y2="110" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
  <rect x="71" y="108" width="8" height="4" fill="#22d3ee" rx="1" />
</svg>
